<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The New York Times</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      font-family: Georgia, 'Times New Roman', Times, serif;
      background-color: white;
      color: #000;
      margin: 0;
      padding: 0;
      line-height: 1.4;
    }
    .nyt-header {
      border-bottom: 1px solid #000;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 1300px;
      margin: 0 auto;
    }
    .menu-icon {
      font-size: 1.8rem;
      cursor: pointer;
    }
    .nyt-logo {
      font-size: 1.8rem;
      font-weight: bold;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      letter-spacing: -0.5px;
    }
    .profile-icon {
      font-size: 1.6rem;
      cursor: pointer;
    }
    .content {
      max-width: 720px;
      margin: 40px auto;
      padding: 0 20px;
      text-align: left;
    }
    .urgent-title {
      font-size: 1.95rem;
      line-height: 1.12;           /* Ajustado levemente para quebrar melhor as linhas */
      font-weight: 900;
      margin: 0 0 12px 0;
      color: #000;
      letter-spacing: -0.4px;      /* Ajuste fino para ajudar no equilíbrio */
    }
    .urgent-title strong {
      text-transform: uppercase;   /* Só o "URGENT:" fica maiúsculo */
    }
    .subtitle {
      font-size: 1.25rem;
      line-height: 1.35;
      color: #222;
      margin: 0 0 8px 0;
      font-weight: 500;
    }
  </style>
</head>
<body>

  <!-- Cabeçalho NYT -->
  <header class="nyt-header">
    <i class="fas fa-bars menu-icon"></i>
    <div class="nyt-logo">The New York Times</div>
    <i class="fas fa-user-circle profile-icon"></i>
  </header>

  <!-- Conteúdo principal -->
  <main class="content">
    <h1 class="urgent-title">
      <strong>URGENT:</strong> Scientists Uncover a Natural Cure For Memory Loss That Can Be Made at Home
    </h1>

    <p class="subtitle">
      Over 15,000 Americans have already reversed Alzheimer’s for less than $45
    </p>

    <!-- Coloque aqui o seu player VTURB ou o conteúdo que quiser abaixo -->

  </main>

</body>
